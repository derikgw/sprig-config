site_name: SprigConfig Documentation
site_description: Spring Boot-style configuration for Python applications
site_url: https://derikgw.github.io/sprig-config/
repo_url: https://github.com/derikgw/sprig-config
repo_name: GitHub
docs_dir: ../docs
exclude_docs: |
  snyk-gitlab-setup.md
  AOP/

theme:
  name: material
  palette:
    primary: green
    accent: light green
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
      - Installation & Quickstart: getting-started.md
      - Configuration Guide: configuration.md
  - Core Concepts:
      - Profiles: profiles.md
      - Imports: imports.md
      - Merge Semantics: merge-order.md
  - Features:
      - Schema Validation: schema-validation.md
      - Security & Secrets: security.md
      - Command Line Interface: cli.md
  - Advanced:
      - Dependency Injection: dependency-injection.md
      - Dynamic Instantiation: instantiation.md
  - API Reference:
      - Overview: api/index.md
      - Core API: api/core.md
      - Secrets: api/secrets.md
      - Utilities: api/utilities.md
      - Exceptions: api/exceptions.md
  - Reference:
      - FAQ: faq.md
      - Design Philosophy: philosophy.md
      - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_bases: true
            show_signature_annotations: true
            separate_signature: true
            line_length: 80
  - git-revision-date-localized:
      enable_creation_date: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/derikgw/sprig-config
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/sprigconfig/

copyright: Copyright &copy; 2026 SprigConfig Contributors
